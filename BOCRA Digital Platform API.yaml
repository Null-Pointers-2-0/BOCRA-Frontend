openapi: 3.0.3
info:
  title: BOCRA Digital Platform API
  version: 1.0.0
  description: |-
    Unified REST API for the Botswana Communications Regulatory Authority (BOCRA) digital platform.

    ## Modules
    - **Accounts** — Registration, authentication, profile management
    - **Licensing** — Licence applications, renewals, verification
    - **Complaints** — Submit and track regulatory complaints
    - **Publications** — Documents, regulations, policy papers
    - **Tenders** — Open tenders and procurement notices
    - **News** — BOCRA announcements and press releases
    - **Analytics** — QoS metrics and telecoms statistics
    - **Notifications** — In-app and email notification management

    ## Authentication
    All protected endpoints require a JWT Bearer token in the `Authorization` header:
    ```
    Authorization: Bearer <access_token>
    ```
    Obtain tokens via `POST /api/v1/accounts/login/`. Refresh via `POST /api/v1/accounts/token/refresh/`.

    ## Response Format
    All responses use a consistent envelope:
    ```json
    {"success": true, "message": "...", "data": {...}, "errors": null}
    ```
  contact:
    name: BOCRA Digital Platform
    email: digital@bocra.org.bw
    url: https://www.bocra.org.bw
  license:
    name: Proprietary
paths:
  /api/v1/:
    get:
      operationId: v1_retrieve
      description: |-
        GET /api/v1/

        Returns the API index — lists all available module endpoints.
        Useful for service discovery and as a health check.
      summary: API root — lists all modules and documentation links
      tags:
      - Core
      security:
      - jwtAuth: []
      - BearerAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: ''
  /api/v1/accounts/change-password/:
    post:
      operationId: v1_accounts_change_password_create
      description: |-
        POST /api/v1/accounts/change-password/

        Change password for the currently authenticated user.

        Auth: Authenticated + Not Locked
      summary: Change password for authenticated user
      tags:
      - Auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasswordChange'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PasswordChange'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PasswordChange'
        required: true
