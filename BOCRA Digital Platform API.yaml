  /api/v1/accounts/users/:
    get:
      operationId: v1_accounts_users_list
      description: |-
        GET /api/v1/accounts/users/

        List all users. Supports filtering and search.
        - ?role=STAFF
        - ?is_active=true
        - ?search=<email or name>

        Auth: Admin
      summary: List all users (admin only)
      parameters:
      - in: query
        name: email_verified
        schema:
          type: boolean
      - in: query
        name: is_active
        schema:
          type: boolean
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - in: query
        name: role
        schema:
          type: string
          enum:
          - ADMIN
          - CITIZEN
          - LICENSEE
          - REGISTERED
          - STAFF
          - SUPERADMIN
        description: |-
          * `CITIZEN` - Citizen / Public
          * `REGISTERED` - Registered User
          * `LICENSEE` - Licensee
          * `STAFF` - BOCRA Staff
          * `ADMIN` - BOCRA Admin
          * `SUPERADMIN` - Super Admin
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      tags:
      - Admin — Users
