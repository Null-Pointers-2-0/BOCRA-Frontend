components:
  schemas:
    AdminUserUpdate:
      type: object
      properties:
        role:
          $ref: '#/components/schemas/RoleEnum'
        is_active:
          type: boolean
          title: Active
          description: Designates whether this user should be treated as active. Unselect
            this instead of deleting accounts.
        email_verified:
          type: boolean
    ApplicationCreate:
      type: object
      description: |-
        Used when an authenticated user submits a new application.
        Supports both saving as DRAFT and direct submission.
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        reference_number:
          type: string
          readOnly: true
        licence_type:
          type: string
          format: uuid
        organisation_name:
          type: string
          maxLength: 255
        organisation_registration:
          type: string
          description: Company registration number (from CIPA).
          maxLength: 100
        contact_person:
          type: string
          maxLength: 200
        contact_email:
          type: string
          format: email
          maxLength: 254
        contact_phone:
          type: string
          maxLength: 20
        description:
          type: string
          description: Brief description of the business / purpose of application.
        status:
          allOf:
          - $ref: '#/components/schemas/ApplicationStatusEnum'
          readOnly: true
        submitted_at:
          type: string
          format: date-time
          readOnly: true
          nullable: true
        submit:
          type: boolean
          writeOnly: true
          default: false
          description: Set to true to submit immediately; false saves as draft.
      required:
      - contact_email
      - contact_person
      - description
      - id
      - licence_type
      - organisation_name
      - reference_number
      - status
      - submitted_at
    ApplicationDetail:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        reference_number:
          type: string
          maxLength: 50
        licence_type:
          allOf:
          - $ref: '#/components/schemas/LicenceTypeList'
          readOnly: true
        organisation_name:
          type: string
          maxLength: 255
        organisation_registration:
          type: string
          description: Company registration number (from CIPA).
          maxLength: 100
        contact_person:
          type: string
          maxLength: 200
        contact_email:
          type: string
          format: email
          maxLength: 254
        contact_phone:
          type: string
          maxLength: 20
        description:
          type: string
          description: Brief description of the business / purpose of application.
        status:
          $ref: '#/components/schemas/ApplicationStatusEnum'
        status_display:
          type: string
          readOnly: true
        submitted_at:
          type: string
          format: date-time
          nullable: true
        decision_date:
          type: string
          format: date-time
          nullable: true
        decision_reason:
          type: string
          description: Required when rejecting an application.
        info_request_message:
          type: string
          description: Message sent to applicant when requesting more information.
        can_cancel:
          type: string
          readOnly: true
        has_licence:
          type: string
          readOnly: true
        licence_id:
          type: string
          readOnly: true
        documents:
          type: array
          items:
            $ref: '#/components/schemas/ApplicationDocument'
          readOnly: true
        status_timeline:
          type: array
          items:
            $ref: '#/components/schemas/ApplicationStatusLog'
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - can_cancel
      - contact_email
      - contact_person
      - created_at
      - description
      - documents
      - has_licence
      - id
      - licence_id
      - licence_type
      - organisation_name
      - status_display
      - status_timeline
      - updated_at
    ApplicationDocument:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        name:
          type: string
          description: Descriptive label for the document.
          maxLength: 255
        file:
          type: string
          format: uri
        file_type:
          type: string
          readOnly: true
        file_size:
          type: integer
          readOnly: true
          description: Size in bytes.
        uploaded_by_name:
          type: string
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - file
      - file_size
      - file_type
      - id
      - name
      - uploaded_by_name
    ApplicationList:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        reference_number:
          type: string
          maxLength: 50
        licence_type_name:
          type: string
          readOnly: true
        licence_type_code:
          type: string
          readOnly: true
        organisation_name:
          type: string
          maxLength: 255
        status:
          $ref: '#/components/schemas/ApplicationStatusEnum'
        status_display:
          type: string
          readOnly: true
        submitted_at:
          type: string
          format: date-time
          nullable: true
        decision_date:
          type: string
          format: date-time
          nullable: true
        has_licence:
          type: string
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - has_licence
      - id
      - licence_type_code
      - licence_type_name
      - organisation_name
      - status_display
      - updated_at
    ApplicationStatusEnum:
      enum:
      - DRAFT
      - SUBMITTED
      - UNDER_REVIEW
      - INFO_REQUESTED
      - APPROVED
      - REJECTED
      - CANCELLED
      type: string
      description: |-
        * `DRAFT` - Draft
        * `SUBMITTED` - Submitted
        * `UNDER_REVIEW` - Under Review
        * `INFO_REQUESTED` - Additional Information Requested
        * `APPROVED` - Approved
        * `REJECTED` - Rejected
        * `CANCELLED` - Cancelled
    ApplicationStatusLog:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        from_status:
          $ref: '#/components/schemas/ApplicationStatusEnum'
        from_status_display:
          type: string
          readOnly: true
        to_status:
          $ref: '#/components/schemas/ApplicationStatusEnum'
        to_status_display:
          type: string
          readOnly: true
        changed_by_name:
          type: string
          readOnly: true
        reason:
          type: string
        changed_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - changed_at
      - changed_by_name
      - from_status
      - from_status_display
      - id
      - to_status
      - to_status_display
    Assign:
      type: object
      description: Assign a staff member as case handler.
      properties:
        assigned_to:
          type: string
          format: uuid
          description: UUID of the staff user to assign.
      required:
      - assigned_to
    BlankEnum:
      enum:
      - ''
    CaseNoteCreate:
      type: object
      description: Staff adds a case note to a complaint.
      properties:
        content:
          type: string
        is_internal:
          type: boolean
          default: true
      required:
      - content
    ComplaintCategory:
      type: object
      description: Simple value/label representation of complaint categories.
      properties:
        value:
          type: string
        label:
          type: string
      required:
      - label
      - value
    ComplaintCategoryEnum:
      enum:
      - SERVICE_QUALITY
      - BILLING
      - COVERAGE
      - CONDUCT
      - INTERNET
      - BROADCASTING
      - POSTAL
      - OTHER
      type: string
      description: |-
        * `SERVICE_QUALITY` - Service Quality
        * `BILLING` - Billing Dispute
        * `COVERAGE` - Network Coverage
        * `CONDUCT` - Operator Conduct
        * `INTERNET` - Internet Services
        * `BROADCASTING` - Broadcasting
        * `POSTAL` - Postal Services
        * `OTHER` - Other
    ComplaintCreate:
      type: object
      description: |-
        Submit a new complaint. Works for both anonymous and logged-in users.
        If the user is authenticated, complainant_name and complainant_email
        are auto-populated from their account.
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        reference_number:
          type: string
          readOnly: true
        complainant_name:
          type: string
          description: Required for anonymous complaints.
          maxLength: 200
        complainant_email:
          type: string
          format: email
          description: Required — used for status notifications.
          maxLength: 254
        complainant_phone:
          type: string
          maxLength: 20
        against_operator_name:
          type: string
          description: Free-text operator name (always filled, even if licence linked).
          maxLength: 255
        against_licensee:
          type: string
          format: uuid
          nullable: true
          description: Link to an active licence, if identifiable.
        category:
          $ref: '#/components/schemas/ComplaintCategoryEnum'
        subject:
          type: string
          maxLength: 300
        description:
          type: string
        priority:
          $ref: '#/components/schemas/PriorityEnum'
        status:
          allOf:
          - $ref: '#/components/schemas/ComplaintStatusEnum'
          readOnly: true
        sla_deadline:
          type: string
          format: date-time
          readOnly: true
          nullable: true
          description: Auto-calculated from priority on submission.
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - against_operator_name
      - category
      - complainant_email
      - complainant_name
      - created_at
      - description
      - id
      - reference_number
      - sla_deadline
      - status
      - subject
    ComplaintDetail:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        reference_number:
          type: string
          maxLength: 50
        complainant_name:
          type: string
          description: Required for anonymous complaints.
          maxLength: 200
        complainant_email:
          type: string
          format: email
          description: Required — used for status notifications.
          maxLength: 254
        complainant_phone:
          type: string
          maxLength: 20
